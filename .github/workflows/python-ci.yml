name: Titanic ML CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Installation
        run: python --version

      - name: Verify Scikit-Learn
        run: python -c "import sklearn; print(sklearn.__version__)"

      - name: Verify Pandas
        run: python -c "import pandas as pd; print(pd.__version__)"

      - name: Verify NumPy
        run: python -c "import numpy as np; print(np.__version__)"

      - name: CI Completed
        run: echo "Titanic project validation completed successfully."